name: Update World Cup Final Scores

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write

jobs:
  update-final-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch final scores
        run: npm run update-scores
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Commit updated results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update World Cup final scores"
          file_pattern: public/world-cup-results.json
