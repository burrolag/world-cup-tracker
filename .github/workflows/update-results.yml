name: Update World Cup Final Scores

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-final-scores:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch final scores
        run: npm run update-scores
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Commit updated results
        id: commit-results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update World Cup final scores"
          file_pattern: public/world-cup-results.json

      - name: Build updated site
        if: steps.commit-results.outputs.changes_detected == 'true'
        run: npm run build

      - name: Upload Pages artifact
        if: steps.commit-results.outputs.changes_detected == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy updated site to GitHub Pages
        if: steps.commit-results.outputs.changes_detected == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
